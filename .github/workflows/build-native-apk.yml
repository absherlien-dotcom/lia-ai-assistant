name: Build LIA Native APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android-native/**'
      - '.github/workflows/build-native-apk.yml'

jobs:
  build-native-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: cd android-native && gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIA-AI-native-debug-apk
          path: android-native/app/build/outputs/apk/debug/app-debug.apk
